name: install-smoke

# Guard against breaking the public install path. Runs on PRs/pushes that
# touch install.sh, the 5dive bundle, agent setup helpers, or the demo
# Dockerfile. The Dockerfile is structured to RUN install.sh against a
# clean ubuntu:22.04 during image build (with systemctl stubbed) — so a
# successful `docker build` proves install.sh + the bundle + units + hooks
# + skills lay down cleanly on a fresh host. We then boot the bundle to
# confirm `5dive --version` works post-install.

on:
  pull_request:
    paths:
      - 'install.sh'
      - '5dive'
      - '5dive-agent-start'
      - 'src/**'
      - 'hooks/**'
      - 'skills/**'
      - 'systemd/**'
      - 'docker/Dockerfile'
      - 'projects-CLAUDE.md'
      - '.github/workflows/install-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - '5dive'
      - '5dive-agent-start'
      - 'src/**'
      - 'hooks/**'
      - 'skills/**'
      - 'systemd/**'
      - 'docker/Dockerfile'
      - 'projects-CLAUDE.md'
      - '.github/workflows/install-smoke.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Lint install + bundle + agent-start
        # Linting the bundle (not src/) lets us skip --shell=bash gymnastics
        # — bundle-drift already enforces that bundle == build.sh(src/).
        run: shellcheck -S error install.sh 5dive 5dive-agent-start build.sh

  docker-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (runs install.sh against fresh ubuntu:22.04)
        run: docker build -f docker/Dockerfile -t 5dive-smoke .
      - name: Verify CLI is on PATH and reports the expected version
        run: |
          docker run --rm --entrypoint /usr/local/bin/5dive 5dive-smoke --version
      - name: Verify the bundled version matches src/header.sh
        run: |
          expected=$(grep -oE '^readonly FIVE_VERSION="[^"]+"' src/header.sh | cut -d'"' -f2)
          actual=$(docker run --rm --entrypoint /usr/local/bin/5dive 5dive-smoke --version | tr -d '\n')
          # `5dive --version` may print "5dive 0.1.0" or similar — match loosely.
          if ! echo "$actual" | grep -q "$expected"; then
            echo "ERROR: installed 5dive reports '$actual', expected version '$expected'"
            exit 1
          fi
